version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: neurobalance_postgres
    environment:
      POSTGRES_USER: neuro
      POSTGRES_PASSWORD: neuropass
      POSTGRES_DB: neurobalance
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U neuro -d neurobalance']
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    container_name: neurobalance_ai
    ports:
      - '8000:8000'
    environment:
      - PORT=8000
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: neurobalance_backend
    ports:
      - '4000:4000'
    environment:
      - DATABASE_URL=postgresql://neuro:neuropass@postgres:5432/neurobalance
      - JWT_SECRET=your-super-secret-key-min-32-chars-neurobalance-ai
      - AI_SERVICE_URL=http://ai-service:8000
      - PORT=4000
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/health']
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: neurobalance_frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=ws://localhost:4000
      - NEXT_PUBLIC_AI_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:

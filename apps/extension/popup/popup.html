<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroBalance AI</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header>
      <div class="logo">
        <div class="logo-icon">🧠</div>
        <span>NeuroBalance AI</span>
      </div>
      <div id="status-dot" class="status-dot offline"></div>
    </header>

    <!-- Stress display -->
    <div id="stress-panel" class="stress-panel hidden">
      <div class="stress-ring">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="6"/>
          <circle id="stress-arc" cx="40" cy="40" r="34" fill="none" stroke="#22c55e"
            stroke-width="6" stroke-linecap="round" stroke-dasharray="213.6"
            stroke-dashoffset="213.6" transform="rotate(-90 40 40)"/>
        </svg>
        <div class="stress-value">
          <span id="stress-number">0</span>
          <span class="stress-max">/100</span>
        </div>
      </div>
      <div class="stress-meta">
        <div class="meta-item">
          <span class="meta-label">Session Time</span>
          <span id="session-time" class="meta-value">0m</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Stress Level</span>
          <span id="stress-level" class="meta-value level-low">Low</span>
        </div>
      </div>
    </div>

    <!-- Not logged in -->
    <div id="login-panel" class="login-panel">
      <p class="login-msg">Sign in to see your stress score</p>
      <div class="form-group">
        <input type="email" id="nb-email" placeholder="Email" class="nb-input"/>
        <input type="password" id="nb-password" placeholder="Password" class="nb-input"/>
      </div>
      <div id="login-error" class="error hidden"></div>
      <button id="login-btn" class="btn-primary">Sign In</button>
    </div>

    <!-- Actions -->
    <div id="actions" class="actions hidden">
      <a href="http://localhost:3000/dashboard" id="open-dashboard" target="_blank" class="btn-primary full">
        Open Dashboard →
      </a>
      <button id="logout-btn" class="btn-ghost">Sign Out</button>
    </div>

    <p class="footer">Processing stays in your browser</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
